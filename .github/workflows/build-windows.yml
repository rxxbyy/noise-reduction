name: Build Windows app

# Builds the Tkinter Noise Reducer into a Windows app with PyInstaller and
# uploads it as a downloadable artifact. Runs on every push/PR and can be
# triggered manually from the Actions tab. Pushing a version tag (e.g. v1.0.0)
# additionally publishes the zip to a permanent public GitHub Release.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write  # needed to create Releases on tag pushes

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (incl. dev / PyInstaller)
        run: uv sync --dev

      - name: Build executable
        run: uv run pyinstaller noise_reducer.spec

      - name: Package as zip
        run: Compress-Archive -Path dist/NoiseReducer/* -DestinationPath NoiseReducer-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: NoiseReducer-windows
          path: NoiseReducer-windows.zip
          retention-days: 30

      - name: Publish Release (on version tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: NoiseReducer-windows.zip
          generate_release_notes: true
